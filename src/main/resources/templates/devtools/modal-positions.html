<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Position Modal (Add/Edit) -->
<div th:fragment="positionModal" id="positionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="positionModalTitle"><i class="fas fa-briefcase me-2"></i>Add Position</h3>
            <span class="close" onclick="closePositionModal()">&times;</span>
        </div>
        
        <div class="modal-body">
            <form id="positionForm" th:action="@{/devtools/positions/add}" method="post">
                <input type="hidden" id="positionId" name="positionId">

                <div class="mb-3">
                    <label class="form-label">Position Name <span class="text-danger">*</span></label>
                    <input type="text" 
                           class="form-control" 
                           id="positionName" 
                           name="name"
                           placeholder="Enter position name"
                           required>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" 
                            class="btn btn-secondary" 
                            onclick="closePositionModal()">
                        Cancel
                    </button>
                    <button type="button" 
                            class="btn btn-primary" 
                            onclick="submitPositionForm()">
                        <i class="fas fa-save me-2"></i>Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
