<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Office Modal (Add/Edit) -->
<div th:fragment="officeModal" id="officeModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="officeModalTitle"><i class="fas fa-door-open me-2"></i>Add Office</h3>
            <span class="close" onclick="closeOfficeModal()">&times;</span>
        </div>
        
        <div class="modal-body">
            <form id="officeForm" th:action="@{/devtools/offices/add}" method="post">
                <input type="hidden" id="officeId" name="officeId">

                <div class="mb-3">
                    <label class="form-label">Office Name <span class="text-danger">*</span></label>
                    <input type="text" 
                           class="form-control" 
                           id="officeName" 
                           name="officeName"
                           placeholder="Enter office name"
                           required>
                </div>

                <!-- <div class="mb-3">
                    <label class="form-label">Department <span class="text-danger">*</span></label>
                    <select class="form-select" id="officeDepartment" name="departmentId" required>
                        <option value="">Select Department</option>
                        <option th:each="department : ${departments}" 
                                th:value="${department.id}" 
                                th:text="${department.name}"></option>
                    </select>
                </div> -->

                <div class="mb-3">
                    <label class="form-label">Area <span class="text-danger">*</span></label>
                    <select class="form-select" id="officeArea" name="areaId" required>
                        <option value="">Select Area</option>
                        <option th:each="area : ${areas}" 
                                th:value="${area.id}" 
                                th:text="${area.name}"></option>
                    </select>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" 
                            class="btn btn-secondary" 
                            onclick="closeOfficeModal()">
                        Cancel
                    </button>
                    <button type="button" 
                            class="btn btn-primary" 
                            onclick="submitOfficeForm()">
                        <i class="fas fa-save me-2"></i>Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
