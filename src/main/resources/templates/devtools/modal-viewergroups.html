<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Viewer Group Modal (Add/Edit) -->
<div th:fragment="viewerGroupModal" id="viewerGroupModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="viewerGroupModalTitle"><i class="fas fa-users me-2"></i>Add Viewer Group</h3>
            <span class="close" onclick="closeViewerGroupModal()">&times;</span>
        </div>
        
        <div class="modal-body">
            <form id="viewerGroupForm" th:action="@{/devtools/viewergroups/add}" method="post">
                <input type="hidden" id="viewerGroupId" name="groupId">

                <div class="mb-3">
                    <label class="form-label">Viewer Group Name <span class="text-danger">*</span></label>
                    <input type="text" 
                           class="form-control" 
                           id="viewerGroupName" 
                           name="name"
                           placeholder="Enter viewer group name"
                           required>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" 
                            class="btn btn-secondary" 
                            onclick="closeViewerGroupModal()">
                        Cancel
                    </button>
                    <button type="button" 
                            class="btn btn-primary" 
                            onclick="submitViewerGroupForm()">
                        <i class="fas fa-save me-2"></i>Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
