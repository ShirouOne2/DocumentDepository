<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Department Modal (Add/Edit) -->
<div th:fragment="departmentModal" id="departmentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="departmentModalTitle"><i class="fas fa-building me-2"></i>Add Department</h3>
            <span class="close" onclick="closeDepartmentModal()">&times;</span>
        </div>
        
        <div class="modal-body">
            <form id="departmentForm" th:action="@{/devtools/departments/add}" method="post">
                <input type="hidden" id="departmentId" name="departmentId">

                <div class="mb-3">
                    <label class="form-label">Department Name <span class="text-danger">*</span></label>
                    <input type="text" 
                           class="form-control" 
                           id="departmentName" 
                           name="name"
                           placeholder="Enter department name"
                           required>
                </div>

                <!-- ✅ ADDED: Office field -->
                <div class="mb-3">
                    <label class="form-label">Office <span class="text-danger">*</span></label>
                    <select class="form-select" id="departmentOffice" name="officeId" required>
                        <option value="">Select Office</option>
                        <option th:each="office : ${offices}"
                                th:value="${office.officeId}"
                                th:text="${office.officeName}"></option>
                    </select>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" 
                            class="btn btn-secondary" 
                            onclick="closeDepartmentModal()">
                        Cancel
                    </button>
                    <button type="button" 
                            class="btn btn-primary" 
                            onclick="submitDepartmentForm()">
                        <i class="fas fa-save me-2"></i>Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
