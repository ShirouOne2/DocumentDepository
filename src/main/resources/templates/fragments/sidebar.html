    <script>
        // Update sidebar notification badge
        function updateSidebarBadge() {
            fetch('/notifications/api/unread-count')
                .then(response => response.json())
                .then(data => {
                    const sidebarBadge = document.getElementById('sidebarNotifBadge');
                    if (sidebarBadge && data.count > 0) {
                        sidebarBadge.textContent = data.count > 99 ? '99+' : data.count;
                        sidebarBadge.style.display = 'flex';
                    } else if (sidebarBadge) {
                        sidebarBadge.style.display = 'none';
                    }
                })
                .catch(err => console.error('Error updating sidebar badge:', err));
        }
    
        // Update every 30 seconds
        setInterval(updateSidebarBadge, 30000);
        updateSidebarBadge(); // Initial load
    </script>
