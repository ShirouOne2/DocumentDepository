<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - PHLPOST Document Depository</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        .error-icon {
            font-size: 100px;
            color: #E8392F;
            margin-bottom: 20px;
        }
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #E8392F;
            margin: 20px 0;
        }
        .error-message {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }
        .btn-home {
            background: linear-gradient(135deg, #E8392F 0%, #cf2f27 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <div class="error-code" th:text="${errorCode} ?: '404'">404</div>
        <h2>Oops! Something went wrong</h2>
        <p class="error-message" th:text="${errorMessage} ?: 'The page you are looking for does not exist.'">
            The page you are looking for does not exist.
        </p>
        <a href="/dashboard" class="btn btn-home">
            <i class="fas fa-home me-2"></i>Go to Dashboard
        </a>
        <br><br>
        <a href="/Userlogin" class="text-muted" style="font-size: 14px;">
            Or return to login
        </a>
    </div>
</body>
</html>
